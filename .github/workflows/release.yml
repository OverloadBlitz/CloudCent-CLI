name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            os: ubuntu-latest
            npm_dir: linux-x64
            binary: cloudcent
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            os: ubuntu-latest
            npm_dir: linux-arm64
            binary: cloudcent
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            os: macos-latest
            npm_dir: darwin-x64
            binary: cloudcent
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            os: macos-latest
            npm_dir: darwin-arm64
            binary: cloudcent
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            os: windows-latest
            npm_dir: win32-x64
            binary: cloudcent.exe
            archive_ext: zip
          - goos: windows
            goarch: arm64
            os: windows-latest
            npm_dir: win32-arm64
            binary: cloudcent.exe
            archive_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        shell: bash
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          go build -ldflags "-s -w -X github.com/OverloadBlitz/cloudcent-cli/cmd.Version=${VERSION}" -o ${{ matrix.binary }} ./main.go

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          ARCHIVE="cloudcent_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar czf "${ARCHIVE}" ${{ matrix.binary }}
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ inputs.tag }}".TrimStart('v')
          $archive = "cloudcent_${version}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          Compress-Archive -Path "${{ matrix.binary }}" -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Prepare npm package
        shell: bash
        run: |
          mkdir -p npm/${{ matrix.npm_dir }}/bin
          cp ${{ matrix.binary }} npm/${{ matrix.npm_dir }}/bin/

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: "cloudcent_*.${{ matrix.archive_ext }}"

      - name: Upload npm artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm_dir }}
          path: npm/${{ matrix.npm_dir }}/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git tag ${{ inputs.tag }}
          git push origin ${{ inputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          pattern: archive-*
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: artifacts/*
          generate_release_notes: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download all npm artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: npm-artifacts

      - name: Prepare platform packages
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"

          for dir in npm-artifacts/npm-*/; do
            platform=$(basename "$dir" | sed 's/^npm-//')
            pkg_dir="npm/${platform}"
            mkdir -p "${pkg_dir}/bin"
            cp -r "${dir}"bin/* "${pkg_dir}/bin/" 2>/dev/null || true
            chmod +x "${pkg_dir}/bin/"* 2>/dev/null || true
            cd "${pkg_dir}"
            npm version "${VERSION}" --no-git-tag-version --allow-same-version
            cd ../..
          done

      - name: Generate cloudcent.js launcher
        run: |
          mkdir -p npm/cloudcent/bin
          cat > npm/cloudcent/bin/cloudcent.js << 'EOF'
          #!/usr/bin/env node

          const { spawnSync } = require("child_process");
          const path = require("path");
          const os = require("os");

          const PLATFORMS = {
            "darwin-arm64": "@cloudcent/cli-darwin-arm64",
            "darwin-x64":   "@cloudcent/cli-darwin-x64",
            "linux-arm64":  "@cloudcent/cli-linux-arm64",
            "linux-x64":    "@cloudcent/cli-linux-x64",
            "win32-arm64":  "@cloudcent/cli-win32-arm64",
            "win32-x64":    "@cloudcent/cli-win32-x64",
          };

          const platform = `${os.platform()}-${os.arch()}`;
          const pkg = PLATFORMS[platform];

          if (!pkg) {
            console.error(`Unsupported platform: ${platform}`);
            process.exit(1);
          }

          const binName = os.platform() === "win32" ? "cloudcent.exe" : "cloudcent";

          let binPath;
          try {
            binPath = path.join(
              path.dirname(require.resolve(`${pkg}/package.json`)),
              "bin",
              binName
            );
          } catch {
            console.error(
              `Could not find binary package ${pkg}.\n` +
              `Try reinstalling: npm install -g @cloudcent/cli`
            );
            process.exit(1);
          }

          const result = spawnSync(binPath, process.argv.slice(2), {
            stdio: "inherit",
            env: process.env,
          });

          process.exit(result.status ?? 1);
          EOF
          chmod +x npm/cloudcent/bin/cloudcent.js

      - name: Local pack & install test (linux-x64)
        run: |
          cd npm/linux-x64 && PLATFORM_TGZ=$(npm pack 2>&1 | tail -1) && cd ../..
          cd npm/cloudcent && MAIN_TGZ=$(npm pack 2>&1 | tail -1) && cd ../..
          npm install -g "npm/linux-x64/${PLATFORM_TGZ}"
          npm install -g "npm/cloudcent/${MAIN_TGZ}"
          which cloudcent
          cloudcent --help || true
          npm uninstall -g @cloudcent/cli @cloudcent/cli-linux-x64

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/darwin-arm64 npm/darwin-x64 npm/linux-arm64 npm/linux-x64 npm/win32-arm64 npm/win32-x64; do
            echo "Publishing ${dir}..."
            (cd "${dir}" && npm publish --access public)
            sleep 30
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          cd npm/cloudcent
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION}';
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = '${VERSION}';
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm pack --dry-run 2>&1 | tee /tmp/pack-contents.txt
          grep -q "bin/cloudcent.js" /tmp/pack-contents.txt || { echo "ERROR: bin/cloudcent.js missing!"; exit 1; }
          npm publish --access public
